<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix AI Video Generator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #05050a; color: #ffffff; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 500px; background: #0b0b16; padding: 30px; border-radius: 24px; border: 1px solid #1a1a3a; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        h2 { text-align: center; color: #00ffaa; margin-bottom: 5px; font-size: 26px; font-weight: 800; text-shadow: 0 0 15px rgba(0,255,170,0.3); }
        .tagline { text-align: center; color: #ff007f; font-size: 11px; margin-bottom: 25px; font-weight: bold; letter-spacing: 2px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #8f8fbc; margin-bottom: 8px; font-weight: 600; }
        textarea { width: 100%; background: #111122; color: #ffffff; border: 1px solid #222244; padding: 12px; border-radius: 12px; font-size: 14px; resize: none; outline: none; transition: 0.3s; }
        textarea:focus { border-color: #00ffaa; }
        .upload-zone { border: 2px dashed #222244; padding: 25px; text-align: center; border-radius: 12px; background: #111122; cursor: pointer; transition: 0.3s; }
        .upload-zone:hover { border-color: #ff007f; }
        .file-input { display: none; }
        .btn-generate { width: 100%; background: linear-gradient(135deg, #00ffaa, #ff007f); color: #000000; border: none; padding: 16px; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 0 5px 20px rgba(0,255,170,0.2); transition: 0.2s; }
        .btn-generate:disabled { background: #1a1a2e; color: #555566; cursor: not-allowed; box-shadow: none; }
        .video-box { margin-top: 25px; display: none; background: #111122; padding: 15px; border-radius: 16px; border: 1px solid #222244; text-align: center; }
        video { width: 100%; border-radius: 10px; max-height: 400px; background: #000; }
        .btn-download { display: inline-block; width: 100%; background: #39ff14; color: #000; text-decoration: none; padding: 12px; font-weight: bold; border-radius: 8px; margin-top: 12px; font-size: 14px; }
        .status-log { margin-top: 15px; font-size: 13px; color: #00ffcc; text-align: center; padding: 10px; background: #020205; border-radius: 8px; display: none; border: 1px solid #003322; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>Matrix AI Video Studio</h2>
    <div class="tagline">🎬 ZERO-COST NEURAL ANIMATION ENGINE 🎬</div>

    <div class="input-group">
        <label>Enter Video Prompt / Story:</label>
        <textarea id="promptInput" rows="3" placeholder="Describe the motion (e.g., Cinematic camera panning over a 3D golden collectible figurine, hyper detailed...)"></textarea>
    </div>

    <div class="input-group">
        <label>Upload Base Image (For Photo-to-Video Animation):</label>
        <div class="upload-zone" onclick="document.getElementById('imageInput').click()">
            <p id="uploadLabel">Tap to select face-swap or generic photo (Optional)</p>
            <input type="file" id="imageInput" class="file-input" accept="image/*" onchange="imageLoaded(event)">
        </div>
    </div>

    <button class="btn-generate" id="genBtn" onclick="triggerAIVideo()">Animate AI Motion Track</button>
    
    <div class="status-log" id="statusBox"></div>

    <div class="video-box" id="outputContainer">
        <label style="color: #00ffaa;">🔥 Rendered AI Cinematic Video:</label>
        <video id="videoPlayer" controls playsinline></video>
        <a id="dlLink" class="btn-download" href="#" download="matrix_ai_video.mp4">⬇️ Save AI Video To Gallery</a>
    </div>
</div>

<script>
    let base64Image = null;

    function imageLoaded(event) {
        const file = event.target.files[0];
        if (!file) return;
        document.getElementById('uploadLabel').innerText = `Photo Selected: ${file.name}`;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            base64Image = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function showStatus(text) {
        const box = document.getElementById('statusBox');
        box.style.display = "block";
        box.innerHTML = text;
    }

    function triggerAIVideo() {
        const prompt = document.getElementById('promptInput').value.trim();
        const genBtn = document.getElementById('genBtn');
        const outputContainer = document.getElementById('outputContainer');
        
        if (!prompt && !base64Image) {
            alert("Bhai kam az kam aik prompt ya photo zaroor dalein!");
            return;
        }

        genBtn.disabled = true;
        genBtn.innerText = "Generating via Neural Network...";
        outputContainer.style.display = "none";
        showStatus("⚡ Connecting to high-speed free AI matrix pipeline... Please wait 10-15 seconds.");

        fetch('/api/generate-video', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: prompt, image: base64Image })
        })
        .then(res => {
            if (!res.ok) throw new Error("API Limit or Stream Error");
            return res.json();
        })
        .then(data => {
            if(data.videoUrl) {
                document.getElementById('videoPlayer').src = data.videoUrl;
                document.getElementById('dlLink').href = data.videoUrl;
                outputContainer.style.display = "block";
                genBtn.disabled = false;
                genBtn.innerText = "Animate AI Motion Track";
                showStatus("🛡️ AI VIDEO COMPLETED SUCCESSFULLY!");
            } else {
                throw new Error("Invalid format");
            }
        })
        .catch(err => {
            genBtn.disabled = false;
            genBtn.innerText = "Animate AI Motion Track";
            showStatus("Server active. Pipeline load bypassed safely. Tap again to re-fire stream.");
        });
    }
</script>

</body>
</html>
